<style>
  :root {
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --serif: 'Fraunces', ui-serif, "New York", Georgia, serif;
    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --ink: #0E1F18;
    --ink-soft: #2C3E33;
    --ink-muted: #6B7A6F;
    --ink-faint: #B0BCB4;
    --line: #E5EAE6;
    --line-soft: #F0F3F0;
    --accent: #1F4D33;
    --accent-pale: #E5EFE7;
    --gold: #A88A4D;
    --gold-pale: #F2EBDB;
    --cream: #F5EFE6;
    --success: #1A6B3C;
    --danger: #A3301F;
    --focus: rgba(31,77,51,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: var(--sans); background: var(--bg); color: var(--ink);
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility; letter-spacing: -0.005em;
    min-height: 100vh;
  }

  /* ============= PHONE FRAME (everywhere, even desktop) ============= */
  .frame {
    max-width: 420px; margin: 0 auto;
    background: var(--paper); min-height: 100vh;
    position: relative;
    box-shadow: 0 0 60px rgba(15,44,74,0.06);
  }
  @media (min-width: 500px) {
    body { padding: 24px 0; }
    .frame { border-radius: 24px; min-height: calc(100vh - 48px); overflow: hidden; }
  }

  /* ============= TOP BAR ============= */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    background: rgba(255,255,255,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 0.5px solid var(--line);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .topbar-back {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--line-soft); border: none; cursor: pointer;
    display: none; place-items: center; flex-shrink: 0;
  }
  .topbar-back.show { display: grid; }
  .topbar-back svg { width: 14px; height: 14px; stroke: var(--ink); fill: none; stroke-width: 2; }
  .topbar-brand {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--serif); font-size: 16px; font-weight: 500;
    letter-spacing: -0.015em; flex: 1; min-width: 0;
    color: var(--ink); text-decoration: none;
    cursor: pointer; transition: opacity 0.12s;
  }
  .topbar-brand:hover { opacity: 0.7; }
  .topbar-brand .dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: grid; place-items: center;
    font-family: var(--serif); font-size: 11px;
    flex-shrink: 0;
  }
  .topbar-brand .brand-logo {
    width: 26px; height: 26px;
    flex-shrink: 0;
  }
  .topbar-brand small {
    font-family: var(--sans); font-size: 9.5px; font-weight: 500;
    color: var(--ink-muted); letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .cart-btn {
    background: none; border: none; cursor: pointer;
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    position: relative; transition: background 0.12s;
    flex-shrink: 0;
  }
  .cart-btn:hover { background: var(--line-soft); }
  .cart-btn svg { width: 18px; height: 18px; stroke: var(--ink); fill: none; stroke-width: 1.5; }
  .cart-badge {
    position: absolute; top: 4px; right: 4px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 500;
    min-width: 16px; height: 16px;
    border-radius: 8px; padding: 0 4px;
    display: none; place-items: center;
    font-variant-numeric: tabular-nums;
  }
  .cart-badge.show { display: grid; }

  /* ============= PAGE CONTENT ============= */
  .page { padding: 24px 22px 100px; }

  .hero-eyebrow {
    font-size: 10.5px; font-weight: 500; letter-spacing: 0.16em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 10px;
  }
  .hero-title {
    font-family: var(--serif); font-size: 30px; font-weight: 400;
    letter-spacing: -0.025em; line-height: 1.1; margin-bottom: 10px;
  }
  .hero-title em { font-style: italic; color: var(--accent); }
  .hero-sub {
    font-size: 14px; color: var(--ink-soft); line-height: 1.55;
    margin-bottom: 32px;
  }

  /* ============= CATEGORY ROWS ============= */
  .cat-row {
    background: var(--paper); border: 0.5px solid var(--line);
    border-radius: 14px; padding: 18px 18px;
    margin-bottom: 10px; cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 14px;
  }
  .cat-row:hover { border-color: var(--accent); transform: translateX(3px); }
  .cat-row .num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-pale); color: var(--accent);
    display: grid; place-items: center;
    font-family: var(--serif); font-size: 13px; font-weight: 500;
    flex-shrink: 0;
  }
  .cat-row .meta { flex: 1; min-width: 0; }
  .cat-row .name {
    font-family: var(--serif); font-size: 16px; font-weight: 500;
    letter-spacing: -0.012em; line-height: 1.2; margin-bottom: 2px;
  }
  .cat-row .desc {
    font-size: 12px; color: var(--ink-muted); line-height: 1.45;
  }
  .cat-row .arrow {
    color: var(--ink-faint); flex-shrink: 0;
    transition: transform 0.15s;
  }
  .cat-row:hover .arrow { transform: translateX(2px); color: var(--accent); }

  /* ============= ITEM LIST (List-first design) ============= */
  .section-header {
    margin: 24px 0 14px;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .section-title {
    font-family: var(--serif); font-size: 17px; font-weight: 500;
    letter-spacing: -0.01em;
  }
  .section-meta {
    font-size: 11px; color: var(--ink-muted);
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .filter-bar {
    display: flex; gap: 6px; overflow-x: auto;
    margin-bottom: 14px; padding-bottom: 4px;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill {
    padding: 5px 12px; border: 0.5px solid var(--line);
    border-radius: 999px; background: var(--paper);
    cursor: pointer; font: 500 11.5px var(--sans);
    color: var(--ink-soft); white-space: nowrap;
    font-family: inherit; transition: all 0.12s;
  }
  .filter-pill:hover { color: var(--accent); border-color: var(--accent); }
  .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .item-list {
    background: var(--paper); border: 0.5px solid var(--line);
    border-radius: 12px; overflow: hidden;
  }
  .item {
    border-bottom: 0.5px solid var(--line-soft);
    transition: background 0.1s;
  }
  .item:last-child { border-bottom: none; }
  .item-head {
    padding: 12px 16px;
    display: flex; align-items: flex-start; gap: 10px;
    cursor: pointer;
  }
  .item-head:hover { background: var(--line-soft); }
  .item.expanded .item-head { background: var(--cream); }
  .item-meta {
    flex: 1; min-width: 0;
  }
  .item-name-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 2px;
  }
  .item-name {
    font-size: 14px; font-weight: 500; color: var(--ink);
    letter-spacing: -0.005em; line-height: 1.25;
  }
  .item-use {
    font-size: 12px; color: var(--ink-muted);
    line-height: 1.4; letter-spacing: -0.002em;
  }
  .item-tag {
    font-size: 10px; font-weight: 500; padding: 1px 7px;
    border-radius: 4px; letter-spacing: 0.02em;
    text-transform: uppercase; flex-shrink: 0;
  }
  .item-tag.renewal { background: var(--gold-pale); color: var(--gold); }
  .item-tag.modification { background: var(--accent-pale); color: var(--accent); }
  .item-tag.annual { background: var(--gold-pale); color: var(--gold); }
  .item-tag.free { background: rgba(26,107,60,0.12); color: var(--success); }
  .item-tag.guide { background: var(--cream); color: var(--gold); }
  .item-cart {
    width: 30px; height: 30px; border-radius: 8px;
    background: none; border: 0.5px solid var(--line); cursor: pointer;
    display: grid; place-items: center; flex-shrink: 0;
    margin-top: 2px;
    font-family: inherit; transition: all 0.15s;
  }
  .item-cart:hover { border-color: var(--accent); background: var(--accent-pale); }
  .item-cart svg { width: 14px; height: 14px; stroke: var(--ink-soft); fill: none; stroke-width: 1.7; }
  .item-cart:hover svg { stroke: var(--accent); }
  .item-cart.added {
    background: var(--success); border-color: var(--success);
  }
  .item-cart.added svg { stroke: #fff; }

  .item-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .item.expanded .item-body { max-height: 600px; }
  .item-body-inner {
    padding: 4px 16px 16px;
    border-top: 0.5px solid var(--line-soft);
  }
  .item-body-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 5px 0; font-size: 12.5px;
  }
  .item-body-label {
    color: var(--ink-muted);
    width: 75px; flex-shrink: 0;
  }
  .item-body-value {
    color: var(--ink-soft); line-height: 1.5; flex: 1;
  }
  .item-body-value.fee {
    font-family: var(--serif); font-size: 14px; font-weight: 500;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  .item-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .item-action-chat, .item-action-add {
    flex: 1; padding: 9px 12px;
    border-radius: 8px; font: 500 12.5px var(--sans);
    cursor: pointer; font-family: inherit;
    transition: all 0.12s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .item-action-chat {
    background: var(--paper); color: var(--ink-soft);
    border: 0.5px solid var(--line);
  }
  .item-action-chat:hover { border-color: var(--accent); color: var(--accent); }
  .item-action-add {
    background: var(--accent); color: #fff; border: none;
  }
  .item-action-add:hover { filter: brightness(1.12); }
  .item-action-add.added { background: var(--success); }

  .edu-box {
    margin: 12px 0 4px;
    padding: 12px 14px;
    background: var(--cream);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
  }
  .edu-title {
    font-family: var(--serif); font-size: 13px; font-weight: 500;
    color: var(--gold); margin-bottom: 6px;
    letter-spacing: -0.005em;
  }
  .edu-body {
    font-size: 12.5px; color: var(--ink-soft); line-height: 1.55;
  }
  .ind-search-wrap {
    position: relative; margin-bottom: 16px;
  }
  .ind-search {
    width: 100%; padding: 10px 14px 10px 36px;
    background: var(--paper); border: 0.5px solid var(--line);
    border-radius: 999px; font: 400 13.5px var(--sans);
    color: var(--ink); font-family: inherit;
    letter-spacing: -0.005em;
  }
  .ind-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--focus); }
  .ind-search-icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%); color: var(--ink-muted);
    pointer-events: none;
  }
  .item-note {
    margin: 10px 0 4px;
    padding: 8px 12px;
    background: var(--gold-pale);
    border-radius: 6px;
    font-size: 11.5px;
    font-style: italic;
    color: var(--gold);
    line-height: 1.5;
  }

  /* ============= INDUSTRY PACKAGES SCREEN ============= */
  .industries-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .industry-card {
    background: var(--paper); border: 0.5px solid var(--line);
    border-radius: 12px; padding: 18px 14px;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .industry-card:hover {
    border-color: var(--gold); transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(184,115,31,0.08);
  }
  .industry-emoji { font-size: 28px; margin-bottom: 8px; }
  .industry-name {
    font-family: var(--serif); font-size: 13px; font-weight: 500;
    letter-spacing: -0.005em; line-height: 1.2; margin-bottom: 2px;
  }
  .industry-meta {
    font-size: 10.5px; color: var(--ink-muted);
  }

  /* ============= INDUSTRY DETAIL (within frame, swipeable) ============= */
  .industry-detail-head {
    text-align: center; padding: 16px 0 22px;
    border-bottom: 0.5px solid var(--line);
    margin-bottom: 22px;
  }
  .industry-detail-emoji { font-size: 40px; margin-bottom: 8px; }
  .industry-detail-name {
    font-family: var(--serif); font-size: 22px; font-weight: 500;
    letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 4px;
  }
  .industry-detail-sub {
    font-size: 12.5px; color: var(--ink-muted); line-height: 1.5;
  }

  .subtype-tabs {
    display: flex; gap: 6px; overflow-x: auto;
    margin-bottom: 18px; padding-bottom: 4px;
  }
  .subtype-tabs::-webkit-scrollbar { display: none; }
  .subtype-tab {
    padding: 7px 14px; border: 0.5px solid var(--line);
    border-radius: 999px; background: var(--paper);
    cursor: pointer; font: 500 12px var(--sans); color: var(--ink-soft);
    white-space: nowrap; font-family: inherit;
    transition: all 0.12s;
  }
  .subtype-tab:hover { border-color: var(--accent); color: var(--accent); }
  .subtype-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .subtype-intro {
    font-size: 13px; color: var(--ink-soft);
    line-height: 1.55; margin-bottom: 14px;
    padding: 12px 14px; background: var(--cream);
    border-radius: 10px; border-left: 3px solid var(--gold);
  }

  /* ============= INDUSTRY FOOTER (other industries link) ============= */
  .other-industries {
    margin-top: 32px; padding: 20px;
    background: var(--bg); border-radius: 14px;
    border: 0.5px solid var(--line);
  }
  .other-industries-label {
    font-size: 11px; color: var(--ink-muted); margin-bottom: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
    font-weight: 500;
  }
  .other-industries-list {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .other-industry-link {
    padding: 8px 12px; background: var(--paper);
    border: 0.5px solid var(--line); border-radius: 8px;
    font-size: 12.5px; color: var(--ink); cursor: pointer;
    transition: all 0.12s; font-family: inherit;
    display: flex; align-items: center; gap: 8px;
    text-align: left;
  }
  .other-industry-link:hover { border-color: var(--accent); color: var(--accent); }
  .other-industry-link span { font-size: 14px; }

  /* ============= CHAT MODAL ============= */
  .chat-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,22,40,0.55);
    display: none; place-items: center;
    padding: 20px; backdrop-filter: blur(4px);
  }
  .chat-overlay.open { display: grid; }
  .chat-modal {
    width: 100%; max-width: 380px; max-height: 90vh;
    background: var(--paper); border-radius: 24px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  }
  .chat-head {
    padding: 18px 20px;
    background: linear-gradient(180deg, var(--cream), var(--paper));
    border-bottom: 0.5px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .chat-head .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: grid; place-items: center;
    font-family: var(--serif); font-size: 14px; font-weight: 500;
    flex-shrink: 0;
  }
  .chat-head-title { flex: 1; min-width: 0; }
  .chat-head-name {
    font-family: var(--serif); font-size: 14.5px; font-weight: 500;
    letter-spacing: -0.005em;
  }
  .chat-head-status {
    font-size: 11px; color: var(--ink-muted);
    display: flex; align-items: center; gap: 5px;
  }
  .chat-head-status::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }
  .chat-close {
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(10,22,40,0.06); border: none; cursor: pointer;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .chat-close svg { width: 12px; height: 12px; stroke: var(--ink); fill: none; stroke-width: 2; }
  .chat-body {
    flex: 1; overflow-y: auto;
    padding: 18px; background: var(--bg);
  }
  .chat-msg {
    margin-bottom: 12px; display: flex;
  }
  .chat-msg.bot { justify-content: flex-start; }
  .chat-msg.user { justify-content: flex-end; }
  .chat-bubble {
    max-width: 85%; padding: 10px 14px;
    border-radius: 18px; font-size: 13.5px;
    line-height: 1.5; letter-spacing: -0.003em;
  }
  .chat-msg.bot .chat-bubble {
    background: var(--paper); color: var(--ink);
    border-bottom-left-radius: 5px;
    border: 0.5px solid var(--line);
  }
  .chat-msg.user .chat-bubble {
    background: var(--accent); color: #fff;
    border-bottom-right-radius: 5px;
  }
  .chat-bubble strong { font-weight: 500; }
  .chat-bubble ul { list-style: none; margin-top: 6px; padding-left: 0; }
  .chat-bubble ul li { padding: 2px 0; padding-left: 12px; position: relative; }
  .chat-bubble ul li::before { content: '·'; position: absolute; left: 4px; }
  .chat-options {
    margin-top: 8px; display: flex; flex-direction: column; gap: 6px;
  }
  .chat-option {
    background: var(--paper); border: 0.5px solid var(--line);
    color: var(--accent); padding: 9px 14px;
    border-radius: 999px; font: 500 12.5px var(--sans);
    cursor: pointer; text-align: left; font-family: inherit;
    transition: all 0.12s;
  }
  .chat-option:hover { background: var(--accent-pale); border-color: var(--accent); }
  .chat-foot {
    padding: 12px 16px; border-top: 0.5px solid var(--line);
    background: var(--paper);
    display: none;
  }
  .chat-foot.show { display: flex; gap: 8px; }
  .chat-input {
    flex: 1; padding: 9px 14px; background: var(--bg);
    border: 0.5px solid var(--line); border-radius: 999px;
    font: 400 13.5px var(--sans); color: var(--ink);
    font-family: inherit;
  }
  .chat-input:focus { outline: none; border-color: var(--accent); }
  .chat-send {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .chat-send svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; }

  /* ============= CART MODAL ============= */
  .cart-overlay {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(10,22,40,0.55);
    display: none; place-items: center;
    padding: 20px;
  }
  .cart-overlay.open { display: grid; }
  .cart-modal {
    width: 100%; max-width: 380px; max-height: 85vh;
    background: var(--paper); border-radius: 24px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .cart-modal-head {
    padding: 18px 20px; border-bottom: 0.5px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cart-modal-head h3 {
    font-family: var(--serif); font-size: 18px; font-weight: 500;
    letter-spacing: -0.015em;
  }
  .cart-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .cart-row {
    padding: 12px 20px; display: flex; justify-content: space-between;
    align-items: flex-start; gap: 12px;
    border-bottom: 0.5px solid var(--line-soft);
  }
  .cart-row:last-child { border-bottom: none; }

    padding: 0; margin-left: 4px; font-family: inherit;
  }

  .cart-foot {
    padding: 16px 20px; border-top: 0.5px solid var(--line);

  }
  .cart-total {

    margin-bottom: 12px;
  }
  .cart-total-label { font-size: 12px; color: var(--ink-muted); }
  .cart-total-value {
    font-family: var(--serif); font-size: 22px; font-weight: 500;
    color: var(--accent); font-variant-numeric: tabular-nums;
  }
  .cart-checkout {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border-radius: 12px; border: none; cursor: pointer;
    font: 500 14px var(--sans); font-family: inherit;

  .cart-checkout:hover { filter: brightness(1.1); }
  .cart-empty {
    padding: 50px 20px; text-align: center; color: var(--ink-muted);

    font-family: var(--serif); font-size: 18px; color: var(--ink-soft);

  }

  .toast {
    position: fixed; bottom: 80px; left: 50%;

    padding: 10px 16px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500;
    box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    opacity: 0; pointer-events: none;
    transition: all 0.25s; z-index: 300;

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    font-family: var(--serif); font-size: 24px; font-weight: 500;

  }
  .flagship-price small { font-size: 12px; opacity: 0.7; font-family: var(--sans); font-weight: 400; }

    border: none; cursor: pointer;
    font: 500 12px var(--sans); font-family: inherit;

function postChatLead(payload) {
  try {
    const body = {
      formType: 'diagnostic',
      form: 'lead-bizdoc-ourservice',
      formTitle: payload.title || 'Bizdoc service enquiry',
      ref: payload.ref || undefined,
      answers: {
        contact: {

        leadType: payload.leadType || 'inbound',
        transactionRef: payload.transactionRef || '',
        sourceURL: payload.sourceURL || (typeof window !== 'undefined' ? window.location.href : ''),
        timestamp: new Date().toISOString(),
        notes: payload.notes || '',
      },
      meta: {
        source: payload.leadType === 'awaiting_payment'
          ? 'chat_bizdoc_ourservice_subscribe'
          : 'chat_bizdoc_ourservice',
      },
    };
    fetch(HAMZURY_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
    }).catch(function (err) { console.warn('[chat-lead] post failed:', err); });
  } catch (err) {
    console.warn('[chat-lead] post error:', err);
  }
}

// ============= ROUTING (URL parsing for shares) =============
function parseUrl() {
  try {
    // Server-injected slug takes priority — set by /bizdoc/ourservice/packages/:industry route.
    if (window.__INITIAL_PACKAGE__) {
      const slug = String(window.__INITIAL_PACKAGE__).toLowerCase().replace(/-/g, '_');
      if (PACKAGES[slug]) {
        currentIndustry = slug;
        currentSubtype = PACKAGES[slug].subtypes[0].id;
        currentScreen = 'industry-detail';
        return;
      }
    }
    const path = window.location.pathname;
    const hash = window.location.hash;
    // Check for /packages/[industry] pattern in path or hash. Accept hyphens too
    // (e.g. /packages/travel-agency) and normalize to the underscore slug.
    const m = (path + hash).match(/packages\/([a-z0-9_-]+)/);
    if (m) {
      const slug = m[1].replace(/-/g, '_');
      if (PACKAGES[slug]) {
        currentIndustry = slug;
        currentSubtype = PACKAGES[slug].subtypes[0].id;
        currentScreen = 'industry-detail';
      }
    }
  } catch (e) { /* sandbox restriction — ignore */ }
}
parseUrl();

window.toggleCart = (id) => {

function renderCart() {
  const list = document.getElementById('cart-list');
  const foot = document.getElementById('cart-foot-area');
  if (cart.length === 0) {
    list.innerHTML = `<div class="cart-empty"><div class="big">Cart is empty</div><div>Browse and add what you need.</div></div>`;

    return;

  list.innerHTML = cart.map((c, i) => `
    <div class="cart-row">
      <div class="cart-row-meta">
        <div class="cart-row-name">${c.name}</div>
        <div class="cart-row-tag">${c.use}</div>

      <button class="cart-row-x" onclick="removeFromCart(${i})">×</button>
    </div>
  `).join('');

  let total = 0; let hasVarying = false;
  cart.forEach(c => {
    const m = c.fee.match(/₦([\d,]+)/);
    if (m) total += parseInt(m[1].replace(/,/g, ''), 10);

function askQuestion3() {
  addBotMsg('<strong>3 of 3 — Best way to reach you?</strong>', [
    { label: 'WhatsApp', action: () => { addUserMsg('WhatsApp'); chatAnswers.push('WhatsApp'); setTimeout(submitChatLead, 600); } },
    { label: 'Email', action: () => { addUserMsg('Email'); chatAnswers.push('Email'); setTimeout(submitChatLead, 600); } },
    { label: 'Phone call', action: () => { addUserMsg('Phone call'); chatAnswers.push('Phone'); setTimeout(submitChatLead, 600); } }
  ]);
}
function submitChatLead() {
  // POST the inbound lead to the Apps Script backend → "Inbound Leads" tab.
  postChatLead({
    title: 'Bizdoc inbound lead',
    service: (chatContext && chatContext.name) || '',
    q1: chatAnswers[0] || '',
    q2: chatAnswers[1] || '',
    q3: chatAnswers[2] || '',
    leadType: 'inbound',
    notes: chatAnswers.slice(3).join(' | '),
  });
  addBotMsg(`Thank you. Our team will reach you on <strong>${chatAnswers[2]}</strong> within 24 hours.\n\nWe'll have everything ready to move quickly once we confirm your details.`);
  // Cap the conversation
  setTimeout(() => {
    addBotMsg('Anything else you want us to know?', [
      { label: "No, that's all", action: () => { addUserMsg("That's all, thank you"); setTimeout(closeWithThanks, 800); } },
      { label: 'Add another note', action: () => {
        addUserMsg('I want to add a note');
        document.getElementById('chat-foot').classList.add('show');
        document.getElementById('chat-input').placeholder = 'Add anything else...';
        chatStep = 4;
      }}
    ]);
  }, 1200);
}
function closeWithThanks() {
  addBotMsg('Thank you for your interest. Bizdoc is here whenever you need us.');
  setTimeout(() => closeChat(), 2000);
}

window.sendChat = () => {
  const input = document.getElementById('chat-input');
  const v = input.value.trim();
  if (!v) return;
  addUserMsg(v);
  chatAnswers.push(v);
  input.value = '';
  if (chatStep === 1) {
    document.getElementById('chat-foot').classList.remove('show');
    setTimeout(askQuestion2, 600);
  } else if (chatStep === 4) {
    document.getElementById('chat-foot').classList.remove('show');
    setTimeout(closeWithThanks, 800);
  } else if (chatStep === 'sub-name') {
    setTimeout(askSubContact, 600);
  } else if (chatStep === 'sub-contact') {
    setTimeout(askSubReadiness, 600);
  } else if (chatStep === 'sub-receipt') {
    document.getElementById('chat-foot').classList.remove('show');
    setTimeout(() => finalizeReceipt(v), 400);
  } else if (chatStep === 'sub-email') {
    document.getElementById('chat-foot').classList.remove('show');
    setTimeout(() => finalizeEmail(v), 400);
  }
};
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});

function addBotMsg(text, options) {
  const body = document.getElementById('chat-body');
  const formatted = text.replace(/\n/g, '<br>');
  let optsHtml = '';
  if (options) {
    optsHtml = `<div class="chat-options">${options.map((o, i) => `<button class="chat-option" data-opt="${i}">${o.label}</button>`).join('')}</div>`;
  }
  const msg = document.createElement('div');
  msg.className = 'chat-msg bot';
  msg.innerHTML = `<div class="chat-bubble">${formatted}${optsHtml}</div>`;
  body.appendChild(msg);
  body.scrollTop = body.scrollHeight;
  if (options) {
    msg.querySelectorAll('.chat-option').forEach((b, i) => {
      b.addEventListener('click', () => {
        // Remove all options after click
        msg.querySelectorAll('.chat-options').forEach(o => o.remove());
        options[i].action();
      });
    });
  }
}
function addUserMsg(text) {
  const body = document.getElementById('chat-body');
  const msg = document.createElement('div');
  msg.className = 'chat-msg user';
  msg.innerHTML = `<div class="chat-bubble">${text}</div>`;
  body.appendChild(msg);
  body.scrollTop = body.scrollHeight;
}

// ============= SHARE =============
window.sharePackage = () => {
  try {
    const slug = String(currentIndustry || '').replace(/_/g, '-');
    const url = `${window.location.origin}/bizdoc/ourservice/packages/${slug}`;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(
        () => showToast('Link copied — paste anywhere'),
        () => showToast('Link: ' + url)
      );
    } else {
      showToast('Copy: ' + url);
    }
  } catch (e) {
    showToast('Share link copied');
  }
};

// ============= TOAST =============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function escapeAttr(s) { return String(s).replace(/'/g, '&apos;').replace(/"/g, '&quot;'); }

render();
updateCartBadge();
