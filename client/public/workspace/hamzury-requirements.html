<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamzury — Project Requirements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Apple system font stack — renders SF Pro on Apple devices */
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --serif: 'Fraunces', ui-serif, "New York", "Iowan Old Style", Georgia, serif;
    --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;

    --bg: #FAFAF7;
    --paper: #FFFFFF;
    --ink: #0A0A0A;
    --ink-soft: #3C3C3E;
    --ink-muted: #86868B;
    --ink-faint: #C7C7CC;
    --line: #E5E5E5;
    --line-soft: #F2F2F0;
    --accent: #0A0A0A;
    --accent-warm: #B8731F;
    --success: #1E7A48;
    --danger: #D92A1C;
    --focus: rgba(10,10,10,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100vh;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv01", "cv11";
    letter-spacing: -0.01em;
  }

  /* ============ DEMO SWITCHER ============ */
  .demo-bar {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 100;
    background: rgba(10,10,10,0.92);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    color: #fff;
    padding: 7px 8px 7px 14px;
    border-radius: 980px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .demo-bar .label { opacity: 0.65; letter-spacing: 0; }
  .demo-bar select {
    background: #fff;
    color: var(--ink);
    border: none;
    padding: 6px 26px 6px 12px;
    border-radius: 980px;
    font: 500 12.5px var(--sans);
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%230A0A0A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    max-width: 260px;
  }
  .demo-bar select optgroup {
    font-weight: 500;
    color: var(--accent-warm);
    font-style: normal;
  }
  .demo-bar select option {
    color: var(--ink);
    font-weight: 400;
    padding: 4px 8px;
  }

  /* ============ SHELL ============ */
  .app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
  }
  @media (max-width: 600px) { .topbar { padding: 16px 20px; } }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .brand-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    display: grid; place-items: center;
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 500;
  }

  .main {
    flex: 1;
    padding: 24px 32px 60px;
    max-width: 820px;
    width: 100%;
    margin: 0 auto;
  }
  @media (max-width: 600px) { .main { padding: 20px 20px 40px; } }

  /* ============ INTRO ============ */
  .intro {
    text-align: left;
    padding: 40px 0 32px;
    animation: fadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-warm);
    letter-spacing: 0.01em;
    margin-bottom: 14px;
  }
  .intro-title {
    font-family: var(--serif);
    font-size: 46px;
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.08;
    margin-bottom: 16px;
  }
  .intro-title em { font-style: italic; color: var(--accent-warm); }
  @media (max-width: 600px) { .intro-title { font-size: 34px; } }

  .intro-body {
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 580px;
    margin-bottom: 28px;
    letter-spacing: -0.005em;
  }

  .intro-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 32px;
    padding: 20px 0;
    border-top: 0.5px solid var(--line);
    border-bottom: 0.5px solid var(--line);
    margin-bottom: 32px;
  }
  .meta-item .k {
    font-size: 12px;
    color: var(--ink-muted);
    margin-bottom: 2px;
  }
  .meta-item .v {
    font-size: 15px;
    font-weight: 500;
  }

  /* ============ PROGRESS ============ */
  .progress-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
  }
  .progress-step {
    flex: 1;
    height: 3px;
    border-radius: 999px;
    background: var(--line);
    transition: background 0.4s;
  }
  .progress-step.active { background: var(--ink); }
  .progress-step.done { background: var(--ink); }

  .progress-text {
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
  }

  /* ============ STEP ============ */
  .step {
    animation: fadeIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    padding-bottom: 40px;
  }

  .step-title {
    font-family: var(--serif);
    font-size: 34px;
    font-weight: 400;
    letter-spacing: -0.022em;
    line-height: 1.12;
    margin-bottom: 12px;
  }
  .step-subtitle {
    font-size: 16px;
    color: var(--ink-muted);
    line-height: 1.5;
    margin-bottom: 32px;
    letter-spacing: -0.005em;
  }

  /* ============ FIELDS ============ */
  .field {
    margin-bottom: 24px;
  }
  .field-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--ink);
    letter-spacing: -0.003em;
  }
  .field-hint {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 6px;
    line-height: 1.45;
  }
  .field-required {
    color: var(--accent-warm);
    margin-left: 2px;
  }

  .input, .textarea {
    width: 100%;
    background: var(--paper);
    border: 0.5px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    font: 400 16px var(--sans);
    letter-spacing: -0.005em;
    color: var(--ink);
    transition: all 0.15s;
  }
  .input:hover, .textarea:hover { border-color: var(--ink-faint); }
  .input:focus, .textarea:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 4px var(--focus);
  }
  .input::placeholder, .textarea::placeholder { color: var(--ink-faint); }
  .textarea { resize: vertical; min-height: 110px; line-height: 1.5; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }

  /* ============ FILE UPLOAD ============ */
  .upload-zone {
    border: 1.5px dashed var(--line);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--paper);
  }
  .upload-zone:hover {
    border-color: var(--ink);
    background: var(--line-soft);
  }
  .upload-zone.dragging {
    border-color: var(--ink);
    background: var(--line-soft);
    transform: scale(1.005);
  }
  .upload-icon {
    width: 36px; height: 36px;
    margin: 0 auto 12px;
    border-radius: 50%;
    background: var(--line-soft);
    display: grid; place-items: center;
  }
  .upload-icon svg { width: 18px; height: 18px; stroke: var(--ink-soft); }
  .upload-primary {
    font-size: 14.5px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .upload-secondary {
    font-size: 13px;
    color: var(--ink-muted);
  }
  .upload-zone input[type="file"] { display: none; }

  .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .file-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--paper);
    border: 0.5px solid var(--line);
    border-radius: 10px;
    animation: fadeIn 0.25s;
  }
  .file-icon {
    width: 32px; height: 32px;
    border-radius: 7px;
    background: var(--line-soft);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .file-icon svg { width: 16px; height: 16px; stroke: var(--ink-soft); }
  .file-meta { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.003em;
  }
  .file-size { font-size: 12.5px; color: var(--ink-muted); margin-top: 1px; }
  .file-remove {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--ink-muted);
    font-size: 16px;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .file-remove:hover { background: var(--line-soft); color: var(--danger); }

  /* ============ REVIEW ============ */
  .review-section {
    background: var(--paper);
    border: 0.5px solid var(--line);
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .review-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--line);
  }
  .review-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: -0.003em;
  }
  .review-edit {
    font-size: 13px;
    color: var(--accent-warm);
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
  }
  .review-edit:hover { text-decoration: underline; }
  .review-grid { display: grid; gap: 10px; }
  .review-item {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 16px;
    font-size: 14px;
    line-height: 1.5;
  }
  .review-item dt { color: var(--ink-muted); letter-spacing: -0.003em; }
  .review-item dd { color: var(--ink); font-weight: 400; }
  .review-item dd.empty { color: var(--ink-faint); font-style: italic; }
  @media (max-width: 600px) {
    .review-item { grid-template-columns: 1fr; gap: 2px; }
    .review-item dt { font-size: 12px; }
  }

  /* ============ FOOTER ============ */
  .footer {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 70%, transparent);
    padding: 20px 0 24px;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-top: 20px;
  }

  .btn {
    font: 500 15px var(--sans);
    padding: 13px 28px;
    border-radius: 980px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: -0.003em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--ink);
    color: #fff;
  }
  .btn-primary:hover { background: #333; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled {
    background: var(--ink-faint);
    cursor: not-allowed;
  }

  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
  }
  .btn-ghost:hover { color: var(--ink); background: var(--line-soft); }

  /* ============ OUTRO ============ */
  .outro {
    padding: 60px 0;
    text-align: left;
    animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .outro-mark {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--ink);
    display: grid; place-items: center;
    margin-bottom: 24px;
  }
  .outro-mark svg { width: 24px; height: 24px; }
  .outro-ref {
    display: inline-block;
    margin-top: 16px;
    padding: 6px 14px;
    border-radius: 999px;
    background: var(--line-soft);
    font: 500 13px var(--mono);
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* misc */
  .service-tag {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--line-soft);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 14px;
    letter-spacing: -0.003em;
  }
</style>
</head>
<body>

<div class="demo-bar" id="demo-bar">
  <span class="label">Preview · switch package</span>
  <select id="service-selector"></select>
</div>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot">H</div>
      <span>Hamzury</span>
    </div>
  </div>

  <div class="main" id="main"></div>
</div>

<script>
// ============= SERVICE REQUIREMENT FLOWS =============

  cac: {
    department: 'business',

      body: 'We need a few details to file with the Corporate Affairs Commission. This takes about 8–10 minutes, and you can save and return anytime.',

      {

        fields: [
          { type: 'textarea', id: 'nature', label: 'Nature of business', required: true, placeholder: 'Describe what the business does in 2–3 sentences.' },
          { type: 'text', id: 'address', label: 'Proposed registered address', required: true, placeholder: 'Street, city, state' },
          { type: 'number', id: 'share_capital', label: 'Share capital (₦)', placeholder: '100,000 (default minimum)', hint: 'Leave blank to use the CAC minimum.' }
        ]
      },
      {

        subtitle: 'For the primary director. We\'ll collect additional directors separately if needed.',
        fields: [
          { type: 'text', id: 'director_name', label: 'Full name', required: true },
          { type: 'text', id: 'director_address', label: 'Residential address', required: true },
          { type: 'tel', id: 'director_phone', label: 'Phone number', required: true, placeholder: '+234 ...' },
          { type: 'email', id: 'director_email', label: 'Email address', required: true }
        ]
      },
      {
        title: 'Documents',
        subtitle: 'Upload the director\'s ID and a passport photograph. Images or PDFs, up to 10MB each.',
        fields: [
          { type: 'file', id: 'director_id', label: 'Government ID (NIN, Driver\'s Licence, or International Passport)', required: true, accept: 'image/*,.pdf' },
          { type: 'file', id: 'passport_photo', label: 'Passport photograph', required: true, accept: 'image/*' },
          { type: 'file', id: 'signature', label: 'Signature (white background, clear)', accept: 'image/*' }
        ]
      },
      {
        title: 'Anything else?',
        subtitle: 'Additional notes, special requests, or questions for our team.',
        fields: [
          { type: 'textarea', id: 'notes', label: 'Notes', placeholder: 'Optional — anything you\'d like us to know.' }
        ]
      }
    ]
  },

  compliance: {
    department: 'business',
    name: 'Compliance Management',
    intro: {
      title: 'Let\'s <em>onboard</em> your business.',
      body: 'Everything we need to take compliance off your plate for the year. You\'ll upload key documents once, and we handle the rest.',
      duration: '10–12 minutes'
    },
    steps: [
      {
        title: 'Business basics',
        subtitle: 'The foundation of your compliance profile.',
        fields: [
          { type: 'text', id: 'business_name', label: 'Business legal name', required: true },
          { type: 'text', id: 'rc_number', label: 'RC / BN number', required: true, placeholder: 'e.g. RC 123456' },
          { type: 'text', id: 'tin', label: 'Tax Identification Number (TIN)', required: true },
          { type: 'text', id: 'address', label: 'Registered address', required: true }
        ]
      },
      {
        title: 'Documents',
        subtitle: 'Upload your current compliance documents. Anything missing, we\'ll flag and help you get.',
        fields: [
          { type: 'file', id: 'cac_cert', label: 'CAC Certificate of Incorporation', required: true, accept: '.pdf,image/*' },
          { type: 'file', id: 'memart', label: 'Memorandum & Articles of Association', accept: '.pdf,image/*' },
          { type: 'file', id: 'tin_cert', label: 'TIN certificate', accept: '.pdf,image/*' },
          { type: 'file', id: 'last_tax', label: 'Last filed tax returns (if any)', accept: '.pdf,image/*' },

      },
      {
        title: 'Team access',

        fields: [
          { type: 'text', id: 'contact_name', label: 'Primary point-of-contact name', required: true },
          { type: 'text', id: 'contact_role', label: 'Their role', required: true, placeholder: 'e.g. Founder, Accountant, Admin' },
          { type: 'email', id: 'contact_email', label: 'Email', required: true },
          { type: 'tel', id: 'contact_phone', label: 'Phone / WhatsApp', required: true }
        ]
      },
      {
        title: 'Current situation',
        subtitle: 'A quick snapshot so we start the year with clear eyes.',
        fields: [
          { type: 'select', id: 'last_filing', label: 'When did you last file taxes?', required: true, options: ['Within the past 6 months', 'Within the past year', '1–2 years ago', 'More than 2 years', 'Never filed', 'Not sure'] },
          { type: 'select', id: 'penalty_status', label: 'Any outstanding penalties?', required: true, options: ['None that I know of', 'Yes, we\'re dealing with some', 'Possibly — we haven\'t checked', 'Not sure'] },
          { type: 'textarea', id: 'concerns', label: 'Anything you\'re worried about?', placeholder: 'Tax letters you\'ve been avoiding, audits, issues with FIRS — tell us now so we can protect you.' }
        ]
      }
    ]
  },

  website: {
    department: 'software',
    name: 'Website Design',
    intro: {
      title: 'Let\'s build your <em>website</em>.',
      body: 'Everything we need to design something that represents your brand and actually converts. If you\'re missing anything, we can help you create it.',
      duration: '8–10 minutes'
    },
    steps: [
      {
        title: 'The business',
        subtitle: 'Who you are and who you serve.',
        fields: [
          { type: 'text', id: 'business_name', label: 'Business name', required: true },
          { type: 'text', id: 'tagline', label: 'Tagline or one-liner', placeholder: 'What you do, in one sentence.' },
          { type: 'textarea', id: 'about', label: 'About the business', required: true, placeholder: 'What you do, who you serve, what makes you different.' },
          { type: 'textarea', id: 'audience', label: 'Who visits your website?', required: true, placeholder: 'Describe your ideal customer. Age, role, pain points, what they\'re looking for.' }

      },
      {
        title: 'The site',

        fields: [

        ]
      },
      {
        title: 'Brand assets',
        subtitle: 'Upload what you have. If you\'re missing anything, we can create it.',
        fields: [

          { type: 'file', id: 'brand_guide', label: 'Brand guide (if you have one)', accept: '.pdf,image/*' },
          { type: 'textarea', id: 'colors', label: 'Brand colors', placeholder: 'List hex codes if you have them, or describe the feeling.' },

      },
      {

          { type: 'select', id: 'content_status', label: 'Do you have website copy written?', required: true, options: ['Yes, all written', 'Some of it', 'No — please write it for us (+₦50,000)', 'Not sure where to start'] },
          { type: 'file', id: 'content_file', label: 'Content document (if you have one)', accept: '.pdf,.doc,.docx,.txt' },
          { type: 'textarea', id: 'services_offered', label: 'Services or products to feature', placeholder: 'List them — we\'ll structure them on the site.' }
        ]
      }
    ]
  },

  brand: {

// ============= STATE =============
// Parse URL to determine service (e.g. /requirements/cac?ref=HAM-XXX or ?service=cac&ref=HAM-XXX)
const reqParams = new URLSearchParams(window.location.search);
const isProdMode = reqParams.get('prod') === '1';
let serviceFromUrl = reqParams.get('service');
const refFromUrl = reqParams.get('ref') || '';

if (!serviceFromUrl) {
  const pathParts = window.location.pathname.toLowerCase().split('/').filter(Boolean);
  const last = pathParts[pathParts.length - 1];
  if (last && SERVICES[last]) serviceFromUrl = last;
}

let currentService = (serviceFromUrl && SERVICES[serviceFromUrl]) ? serviceFromUrl : 'cac';
let currentStep = -1;
let answers = {};
let files = {};

// Hide switcher only when explicitly in production mode (?prod=1)
if (isProdMode) {
  document.getElementById('demo-bar').style.display = 'none';
}

// Webhook for backend submission. Leave empty to use graceful fallback.
const WEBHOOK_URL = '';

const main = document.getElementById('main');
const selector = document.getElementById('service-selector');

function getService() { return SERVICES[currentService]; }
function getTotalSteps() { return getService().steps.length; }

// ============= RENDER =============
function render() {
  const svc = getService();
  const total = getTotalSteps();

  if (currentStep === -1) { renderIntro(svc); return; }
  if (currentStep === total) { renderReview(svc); return; }
  if (currentStep > total) { renderDone(svc); return; }

  renderStep(svc, currentStep);
}

function renderIntro(svc) {
  main.innerHTML = `
    <div class="intro">
      <div class="eyebrow">Project requirements</div>
      <span class="service-tag">${svc.name}</span>
      <h1 class="intro-title">${svc.intro.title}</h1>
      <p class="intro-body">${svc.intro.body}</p>
      <div class="intro-meta">
        <div class="meta-item">
          <div class="k">Duration</div>
          <div class="v">${svc.intro.duration}</div>
        </div>
        <div class="meta-item">
          <div class="k">Steps</div>
          <div class="v">${svc.steps.length}</div>
        </div>
        <div class="meta-item">
          <div class="k">Save anytime</div>
          <div class="v">Secure · private</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startFlow()">Begin →</button>
    </div>
  `;
}

function renderStep(svc, i) {
  const step = svc.steps[i];
  const total = getTotalSteps();

  const progressSteps = Array.from({ length: total }, (_, idx) => {
    const cls = idx < i ? 'done' : idx === i ? 'active' : '';
    return `<div class="progress-step ${cls}"></div>`;
  }).join('');

  const fieldsHtml = step.fields.map(f => renderField(f)).join('');

  main.innerHTML = `
    <div class="progress-text">
      <span>Step ${i + 1} of ${total}</span>
      <span>${svc.name}</span>
    </div>
    <div class="progress-bar">${progressSteps}</div>
    <div class="step">
      <h2 class="step-title">${step.title}</h2>
      ${step.subtitle ? `<p class="step-subtitle">${step.subtitle}</p>` : ''}
      ${fieldsHtml}
    </div>
    <div class="footer">
      <button class="btn btn-ghost" onclick="prevStep()">${i === 0 ? '← Back to intro' : '← Previous'}</button>
      <button class="btn btn-primary" onclick="nextStep()">${i === total - 1 ? 'Review →' : 'Continue →'}</button>
    </div>
  `;

  attachFileHandlers();
}

function renderField(f) {
  const req = f.required ? '<span class="field-required">*</span>' : '';
  const hint = f.hint ? `<div class="field-hint">${f.hint}</div>` : '';
  const val = answers[f.id] || '';

  if (f.type === 'text' || f.type === 'email' || f.type === 'tel' || f.type === 'number') {
    return `
      <div class="field">
        <label class="field-label" for="f-${f.id}">${f.label}${req}</label>
        <input class="input" type="${f.type}" id="f-${f.id}" data-fid="${f.id}" placeholder="${f.placeholder || ''}" value="${escapeHtml(val)}">
        ${hint}
      </div>
    `;
  }
  if (f.type === 'textarea') {
    return `
      <div class="field">
        <label class="field-label" for="f-${f.id}">${f.label}${req}</label>
        <textarea class="textarea" id="f-${f.id}" data-fid="${f.id}" placeholder="${f.placeholder || ''}">${escapeHtml(val)}</textarea>
        ${hint}
      </div>
    `;
  }
  if (f.type === 'select') {
    const opts = f.options.map(o => `<option value="${escapeHtml(o)}" ${val === o ? 'selected' : ''}>${o}</option>`).join('');
    return `
      <div class="field">
        <label class="field-label" for="f-${f.id}">${f.label}${req}</label>
        <select class="input" id="f-${f.id}" data-fid="${f.id}">
          <option value="" ${!val ? 'selected' : ''}>Select one…</option>
          ${opts}
        </select>
        ${hint}
      </div>
    `;
  }
  if (f.type === 'file') {
    const fileList = (files[f.id] || []).map((file, idx) => `
      <div class="file-row">
        <div class="file-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M14 3v5h5M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-5z"/></svg>
        </div>
        <div class="file-meta">
          <div class="file-name">${escapeHtml(file.name)}</div>
          <div class="file-size">${formatBytes(file.size)}</div>
        </div>
        <button class="file-remove" onclick="removeFile('${f.id}', ${idx})" title="Remove">×</button>
      </div>
    `).join('');

    return `
      <div class="field">
        <label class="field-label">${f.label}${req}</label>
        <label class="upload-zone" data-fid="${f.id}">
          <div class="upload-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 16V4m-5 5l5-5 5 5m-12 7v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3"/></svg>
          </div>
          <div class="upload-primary">Drop file${f.multiple ? 's' : ''} here or <u>browse</u></div>
          <div class="upload-secondary">${f.accept ? 'Accepted: ' + f.accept.replace(/\./g, '').replace(/,/g, ', ') : 'Any file'} · max 10MB${f.multiple ? ' each' : ''}</div>
          <input type="file" data-fid="${f.id}" ${f.accept ? `accept="${f.accept}"` : ''} ${f.multiple ? 'multiple' : ''}>
        </label>
        <div class="file-list">${fileList}</div>
        ${hint}
      </div>
    `;
  }
  return '';
}

function renderReview(svc) {
  captureStep(); // capture current before review
  const sections = svc.steps.map((step, idx) => {
    const rows = step.fields.map(f => {
      let val = '';
      if (f.type === 'file') {
        const arr = files[f.id] || [];
        val = arr.length ? arr.map(x => x.name).join(', ') : '<em class="empty">None uploaded</em>';
      } else {
        val = answers[f.id] || '<em class="empty">Not provided</em>';
        if (typeof val === 'string' && val.length > 200) val = escapeHtml(val.slice(0, 200)) + '…';
        else if (!val.startsWith || !val.startsWith('<em')) val = escapeHtml(val);
      }
      return `
        <div class="review-item">
          <dt>${f.label}</dt>
          <dd>${val}</dd>
        </div>
      `;
    }).join('');

    return `
      <div class="review-section">
        <div class="review-head">
          <div class="review-title">${step.title}</div>
          <button class="review-edit" onclick="jumpToStep(${idx})">Edit</button>
        </div>
        <dl class="review-grid">${rows}</dl>
      </div>
    `;
  }).join('');

  main.innerHTML = `
    <div class="progress-text">
      <span>Review</span>
      <span>${svc.name}</span>
    </div>
    <div class="step">
      <h2 class="step-title">Review before submitting.</h2>
      <p class="step-subtitle">Double-check everything. You can edit any section.</p>
      ${sections}
      <div style="margin-top:16px;padding:16px 20px;background:var(--paper);border:0.5px solid var(--line);border-radius:12px;">
        <label style="display:flex;gap:10px;align-items:flex-start;cursor:pointer;font-size:13.5px;line-height:1.5;color:var(--ink-soft);">
          <input type="checkbox" id="req-consent" style="margin-top:3px;flex-shrink:0;" ${answers.__consent ? 'checked' : ''}>
          <span>I confirm the information provided is accurate and agree to Hamzury storing these details and documents to deliver this service. My data is kept private and protected under the Nigeria Data Protection Regulation (NDPR).</span>
        </label>
      </div>
      <div id="req-error" style="display:none;margin-top:10px;padding:10px 14px;background:#FCE8E4;color:#A3301F;border-radius:8px;font-size:13.5px;"></div>
    </div>
    <div class="footer">
      <button class="btn btn-ghost" onclick="prevStep()">← Previous</button>
      <button class="btn btn-primary" onclick="submitForm()">Submit requirements →</button>
    </div>
  `;
}

function renderDone(svc) {
  const ref = refFromUrl || ('HAM-' + Date.now().toString(36).toUpperCase().slice(-6));
  const fileCount = Object.values(files).reduce((n, arr) => n + arr.length, 0);
  main.innerHTML = `
    <div class="outro">
      <div class="outro-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12l5 5 9-10"/>
        </svg>
      </div>
      <div class="eyebrow">Submitted</div>
      <h1 class="intro-title">We've got what we need.</h1>
      <p class="intro-body">Your ${svc.name} requirements are in. A specialist is reviewing now and will reach out on WhatsApp within 4 working hours with a confirmed project timeline and next steps.</p>
      ${fileCount > 0 ? `<p style="font-size:14px;color:var(--ink-muted);margin-bottom:24px;line-height:1.55;">If any of your ${fileCount} uploaded file${fileCount > 1 ? 's' : ''} didn't come through clearly, we'll ask you to resend via WhatsApp.</p>` : ''}
      <div class="outro-ref">Reference · ${ref}</div>
    </div>
  `;
}

// ============= ACTIONS =============
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[s]);
}
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function attachFileHandlers() {
  document.querySelectorAll('.upload-zone').forEach(zone => {
    const fid = zone.dataset.fid;
    const input = zone.querySelector('input[type="file"]');

    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('dragging');
    });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragging'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragging');
      handleFiles(fid, e.dataTransfer.files);
    });

    input.addEventListener('change', (e) => {
      handleFiles(fid, e.target.files);
    });
  });
}

function handleFiles(fid, fileList) {
  const arr = Array.from(fileList);
  const valid = arr.filter(f => f.size <= 10 * 1024 * 1024);
  if (valid.length < arr.length) {
    alert('Some files were over 10MB and skipped.');
  }
  if (!files[fid]) files[fid] = [];
  // Check if multiple allowed
  const svc = getService();
  const field = svc.steps[currentStep].fields.find(f => f.id === fid);
  if (field && !field.multiple) {
    files[fid] = valid.slice(0, 1);
  } else {
    files[fid].push(...valid);
  }
  render();
}

window.removeFile = (fid, idx) => {
  files[fid].splice(idx, 1);
  if (files[fid].length === 0) delete files[fid];
  render();
};

function captureStep() {
  document.querySelectorAll('[data-fid]').forEach(el => {
    if (el.tagName === 'INPUT' && el.type === 'file') return;
    const fid = el.dataset.fid;
    answers[fid] = el.value;
  });
}

window.startFlow = () => {
  currentStep = 0;
  render();
};

window.nextStep = () => {
  captureStep();
  currentStep++;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.prevStep = () => {
  captureStep();
  currentStep--;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.jumpToStep = (i) => {
  currentStep = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// Convert a File object to base64 (without the data: prefix)
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const base64 = result.includes(',') ? result.split(',')[1] : result;
      resolve(base64);
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(file);
  });
}

window.submitForm = async () => {
  // Capture consent
  const consent = document.getElementById('req-consent')?.checked || false;
  answers.__consent = consent;
  const errBox = document.getElementById('req-error');
  const submitBtn = document.querySelector('.footer .btn-primary');

  if (!consent) {
    if (errBox) { errBox.textContent = 'Please confirm before submitting.'; errBox.style.display = 'block'; }
    return;
  }

  // Show loading state
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';
  }
  if (errBox) errBox.style.display = 'none';

  // POST to backend if configured
  if (WEBHOOK_URL) {
    try {
      // Convert all files to base64 in parallel
      const filePayloads = [];
      for (const [fid, arr] of Object.entries(files)) {
        for (const file of arr) {
          if (submitBtn) submitBtn.textContent = `Uploading ${file.name}…`;
          try {
            const base64 = await fileToBase64(file);
            filePayloads.push({
              field: fid,
              name: file.name,
              mimeType: file.type || 'application/octet-stream',
              size: file.size,
              base64: base64
            });
          } catch (fileErr) {
            console.error('Could not read file:', file.name, fileErr);
          }
        }
      }

      if (submitBtn) submitBtn.textContent = 'Sending…';

      await fetch(WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          formType: 'requirement',
          service: currentService,
          serviceName: getService().name,
          paymentRef: refFromUrl,
          ref: refFromUrl || ('HAM-' + Date.now().toString(36).toUpperCase().slice(-6)),
          submittedAt: new Date().toISOString(),
          answers: answers,
          files: filePayloads
        })
      });
    } catch (e) {
      console.error('Submit failed:', e);
      // Continue to thank-you anyway — the team will follow up via WhatsApp
    }
  }

  currentStep = getTotalSteps() + 1;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

// Populate service selector grouped by department
(function populateSelector() {
  const sel = document.getElementById('service-selector');
  sel.innerHTML = '';
  Object.entries(DEPARTMENTS).forEach(([deptKey, dept]) => {
    const og = document.createElement('optgroup');
    og.label = dept.name;
    dept.order.forEach(svcKey => {
      if (!SERVICES[svcKey]) return;
      const opt = document.createElement('option');
      opt.value = svcKey;
      opt.textContent = SERVICES[svcKey].name;
      if (svcKey === currentService) opt.selected = true;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
})();

selector.addEventListener('change', (e) => {
  currentService = e.target.value;
  currentStep = -1;
  answers = {};
  files = {};
  render();
});

render();
</script>
